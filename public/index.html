<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>intip</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ef;
        --panel: #fff;
        --ink: #202124;
        --muted: #756f66;
        --line: #ded8cf;
        --accent: #11685c;
        --accent-dark: #0c5147;
        --danger: #a13b24;
        --danger-soft: #f8e6df;
        --soft: #e7f2ee;
        --cream: #fffaf1;
        --shadow: 0 18px 48px rgba(34, 30, 24, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(17, 104, 92, 0.1), transparent 330px),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        outline: none;
      }

      input {
        min-height: 46px;
        padding: 0 13px;
      }

      textarea {
        min-height: 340px;
        padding: 14px;
        line-height: 1.65;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(17, 104, 92, 0.13);
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .hidden {
        display: none !important;
      }

      .login {
        display: grid;
        place-items: center;
        min-height: 78vh;
        padding: 24px;
      }

      .boot {
        display: grid;
        place-items: center;
        min-height: 78vh;
        padding: 24px;
        color: var(--muted);
        font-weight: 800;
      }

      .login-panel,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .login-panel {
        width: min(420px, 100%);
        padding: 28px;
      }

      .login-panel h1 {
        margin: 0 0 8px;
        font-size: 34px;
        letter-spacing: 0;
      }

      .login-panel p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      .brand p,
      .muted,
      .meta {
        color: var(--muted);
      }

      .brand p {
        margin: 6px 0 0;
        font-size: 15px;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .primary,
      .ghost,
      .danger {
        min-height: 42px;
        border-radius: 8px;
        padding: 0 14px;
        font-weight: 900;
        white-space: nowrap;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .ghost {
        background: var(--soft);
        color: var(--accent);
      }

      .danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .login-panel .primary {
        width: 100%;
        margin-top: 16px;
      }

      .app {
        display: none;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .tab {
        min-height: 74px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        padding: 12px;
        text-align: left;
      }

      .tab strong {
        display: block;
        font-size: 17px;
      }

      .tab span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .tab.active {
        border-color: var(--accent);
        background: var(--soft);
        color: var(--accent);
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        gap: 18px;
      }

      .panel {
        min-width: 0;
        box-shadow: 0 10px 30px rgba(39, 35, 28, 0.07);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      .panel-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .editor,
      .upload-panel {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .list {
        display: grid;
        gap: 10px;
        padding: 14px;
        max-height: 560px;
        overflow: auto;
      }

      .item {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--cream);
      }

      .item-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .item-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .meta {
        font-size: 12px;
      }

      .mini-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--soft);
        color: var(--accent);
        font-weight: 900;
      }

      .icon.delete {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .dropzone {
        display: grid;
        place-items: center;
        min-height: 190px;
        border: 2px dashed #b9b1a5;
        border-radius: 8px;
        background: #fffdf8;
        padding: 22px;
        text-align: center;
        transition:
          border-color 0.18s ease,
          background 0.18s ease,
          transform 0.18s ease;
      }

      .dropzone.dragging {
        border-color: var(--accent);
        background: var(--soft);
        transform: translateY(-2px);
      }

      .dropzone strong {
        display: block;
        margin-bottom: 6px;
        font-size: 18px;
      }

      .dropzone p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .dropzone input {
        display: none;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
        padding: 14px;
      }

      .image-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .thumb {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: var(--soft);
      }

      .image-info {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .empty {
        color: var(--muted);
        padding: 22px 8px;
        text-align: center;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        max-width: min(420px, calc(100% - 36px));
        background: #202124;
        color: #fff;
        border-radius: 8px;
        padding: 12px 14px;
        box-shadow: var(--shadow);
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: 0.2s ease;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 820px) {
        .shell {
          width: min(100% - 20px, 1180px);
          padding-top: 18px;
        }

        .topbar,
        .item-top,
        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .tabs {
          grid-template-columns: 1fr;
        }

        .mini-actions {
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <main id="bootView" class="boot">확인 중</main>

    <main id="loginView" class="login hidden">
      <form class="login-panel" id="loginForm">
        <h1>intip</h1>
        <p>비밀번호로 들어가는 개인 공간입니다.</p>
        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="primary" type="submit">들어가기</button>
      </form>
    </main>

    <main id="appView" class="app">
      <div class="shell">
        <header class="topbar">
          <div class="brand">
            <h1>intip</h1>
            <p>메모, 이미지, 파일을 한 곳에.</p>
          </div>
          <div class="actions">
            <span class="status" id="syncStatus">준비됨</span>
            <button class="ghost" id="refreshButton" type="button">새로고침</button>
            <button class="danger" id="logoutButton" type="button">로그아웃</button>
          </div>
        </header>

        <nav class="tabs" aria-label="저장소 메뉴">
          <button class="tab active" data-tab="notes" type="button">
            <strong>메모</strong>
            <span id="notesTabCount">0개</span>
          </button>
          <button class="tab" data-tab="images" type="button">
            <strong>이미지</strong>
            <span id="imagesTabCount">0개</span>
          </button>
          <button class="tab" data-tab="files" type="button">
            <strong>파일</strong>
            <span id="filesTabCount">0개</span>
          </button>
        </nav>

        <section id="notesView" class="view active">
          <div class="workspace">
            <article class="panel">
              <div class="panel-head">
                <h2>메모 작성</h2>
                <button class="ghost" id="newNoteButton" type="button">새 메모</button>
              </div>
              <form class="editor" id="noteForm">
                <input id="noteTitle" type="text" placeholder="제목" maxlength="160" />
                <textarea id="noteBody" placeholder="여기에 적어두세요."></textarea>
                <div class="actions">
                  <button class="primary" type="submit">저장</button>
                  <button class="danger" id="deleteNoteButton" type="button">삭제</button>
                </div>
              </form>
            </article>

            <aside class="panel">
              <div class="panel-head">
                <h2>저장된 메모</h2>
                <span class="meta" id="noteCount">0개</span>
              </div>
              <div class="list" id="notesList"></div>
            </aside>
          </div>
        </section>

        <section id="imagesView" class="view">
          <div class="panel">
            <div class="panel-head">
              <h2>이미지</h2>
              <span class="meta" id="imageCount">0개</span>
            </div>
            <div class="upload-panel">
              <label class="dropzone" id="imageDropzone" for="imageInput">
                <input id="imageInput" type="file" accept="image/*" multiple />
                <span>
                  <strong>이미지를 끌어오거나 클릭해서 업로드</strong>
                  <p>여러 장을 한 번에 올릴 수 있습니다.</p>
                </span>
              </label>
            </div>
            <div class="gallery" id="imagesList"></div>
          </div>
        </section>

        <section id="filesView" class="view">
          <div class="panel">
            <div class="panel-head">
              <h2>파일</h2>
              <span class="meta" id="fileCount">0개</span>
            </div>
            <div class="upload-panel">
              <label class="dropzone" id="fileDropzone" for="fileInput">
                <input id="fileInput" type="file" multiple />
                <span>
                  <strong>파일을 끌어오거나 클릭해서 업로드</strong>
                  <p>이미지는 이미지 탭에 올리고, 문서나 압축 파일은 여기에 보관하세요.</p>
                </span>
              </label>
            </div>
            <div class="list" id="filesList"></div>
          </div>
        </section>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      const state = {
        activeTab: "notes",
        notes: [],
        files: [],
        currentNoteId: null,
      };

      const $ = (id) => document.getElementById(id);
      const isImage = (file) => String(file.type || "").startsWith("image/");
      const storedImages = () => state.files.filter(isImage);
      const storedFiles = () => state.files.filter((file) => !isImage(file));

      function showToast(message) {
        const toast = $("toast");
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
      }

      function setStatus(message) {
        $("syncStatus").textContent = message;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });

        if (response.status === 401) {
          showLogin();
          throw new Error("로그인이 필요합니다.");
        }

        const contentType = response.headers.get("Content-Type") || "";
        const data = contentType.includes("application/json") ? await response.json() : null;
        if (!response.ok) throw new Error(data?.error || "요청에 실패했습니다.");
        return data;
      }

      function showLogin() {
        $("bootView").classList.add("hidden");
        $("loginView").classList.remove("hidden");
        $("appView").style.display = "none";
      }

      function showApp() {
        $("bootView").classList.add("hidden");
        $("loginView").classList.add("hidden");
        $("appView").style.display = "block";
      }

      function setTab(tab) {
        state.activeTab = tab;
        document.querySelectorAll(".tab").forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tab);
        });
        document.querySelectorAll(".view").forEach((view) => {
          view.classList.toggle("active", view.id === `${tab}View`);
        });
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("ko-KR", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function formatBytes(bytes) {
        if (!bytes) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        return `${(bytes / 1024 ** index).toFixed(index ? 1 : 0)} ${units[index]}`;
      }

      function updateCounts() {
        const images = storedImages();
        const files = storedFiles();
        $("notesTabCount").textContent = `${state.notes.length}개`;
        $("imagesTabCount").textContent = `${images.length}개`;
        $("filesTabCount").textContent = `${files.length}개`;
        $("noteCount").textContent = `${state.notes.length}개`;
        $("imageCount").textContent = `${images.length}개`;
        $("fileCount").textContent = `${files.length}개`;
      }

      function resetEditor() {
        state.currentNoteId = null;
        $("noteTitle").value = "";
        $("noteBody").value = "";
        $("deleteNoteButton").disabled = true;
      }

      function openNote(id) {
        const note = state.notes.find((item) => item.id === id);
        if (!note) return;
        state.currentNoteId = note.id;
        $("noteTitle").value = note.title;
        $("noteBody").value = note.body;
        $("deleteNoteButton").disabled = false;
        setTab("notes");
      }

      function renderNotes() {
        const list = $("notesList");
        list.innerHTML = "";
        if (!state.notes.length) {
          list.innerHTML = '<div class="empty">아직 메모가 없습니다.</div>';
          updateCounts();
          return;
        }

        for (const note of state.notes) {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="item-top">
              <div>
                <h3 class="item-title"></h3>
                <div class="meta">${formatDate(note.updatedAt)}</div>
              </div>
              <div class="mini-actions">
                <button class="icon" type="button" title="열기">↗</button>
              </div>
            </div>
          `;
          item.querySelector(".item-title").textContent = note.title || "Untitled";
          item.querySelector("button").addEventListener("click", () => openNote(note.id));
          list.appendChild(item);
        }
        updateCounts();
      }

      function fileActions(file) {
        const actions = document.createElement("div");
        actions.className = "mini-actions";

        const download = document.createElement("button");
        download.className = "icon";
        download.type = "button";
        download.title = "다운로드";
        download.textContent = "↓";
        download.addEventListener("click", () => {
          window.location.href = `/api/download?id=${encodeURIComponent(file.id)}`;
        });

        const remove = document.createElement("button");
        remove.className = "icon delete";
        remove.type = "button";
        remove.title = "삭제";
        remove.textContent = "×";
        remove.addEventListener("click", () => deleteFile(file.id));

        actions.append(download, remove);
        return actions;
      }

      function renderImages() {
        const list = $("imagesList");
        const images = storedImages();
        list.innerHTML = "";
        if (!images.length) {
          list.innerHTML = '<div class="empty">아직 이미지가 없습니다.</div>';
          updateCounts();
          return;
        }

        for (const image of images) {
          const card = document.createElement("article");
          card.className = "image-card";
          card.innerHTML = `
            <img class="thumb" alt="" loading="lazy" />
            <div class="image-info">
              <div>
                <h3 class="item-title"></h3>
                <div class="meta">${formatBytes(image.size)} · ${formatDate(image.createdAt)}</div>
              </div>
            </div>
          `;
          card.querySelector("img").src = `/api/view?id=${encodeURIComponent(image.id)}`;
          card.querySelector("img").alt = image.name;
          card.querySelector(".item-title").textContent = image.name;
          card.querySelector(".image-info").appendChild(fileActions(image));
          list.appendChild(card);
        }
        updateCounts();
      }

      function renderFiles() {
        const list = $("filesList");
        const files = storedFiles();
        list.innerHTML = "";
        if (!files.length) {
          list.innerHTML = '<div class="empty">아직 파일이 없습니다.</div>';
          updateCounts();
          return;
        }

        for (const file of files) {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="item-top">
              <div>
                <h3 class="item-title"></h3>
                <div class="meta">${formatBytes(file.size)} · ${formatDate(file.createdAt)}</div>
              </div>
            </div>
          `;
          item.querySelector(".item-title").textContent = file.name;
          item.querySelector(".item-top").appendChild(fileActions(file));
          list.appendChild(item);
        }
        updateCounts();
      }

      function renderAll() {
        renderNotes();
        renderImages();
        renderFiles();
      }

      async function loadAll() {
        setStatus("불러오는 중");
        const [notesData, filesData] = await Promise.all([api("/api/notes"), api("/api/files")]);
        state.notes = notesData.notes || [];
        state.files = filesData.files || [];
        renderAll();
        setStatus("저장됨");
      }

      async function saveNote(event) {
        event.preventDefault();
        const title = $("noteTitle").value.trim() || "Untitled";
        const body = $("noteBody").value;
        setStatus("저장 중");
        const data = await api("/api/notes", {
          method: "POST",
          body: JSON.stringify({ id: state.currentNoteId, title, body }),
        });
        const index = state.notes.findIndex((note) => note.id === data.note.id);
        if (index >= 0) state.notes[index] = data.note;
        else state.notes.unshift(data.note);
        state.currentNoteId = data.note.id;
        $("deleteNoteButton").disabled = false;
        renderNotes();
        setStatus("저장됨");
        showToast("메모를 저장했습니다.");
      }

      async function deleteCurrentNote() {
        if (!state.currentNoteId) return;
        if (!confirm("이 메모를 삭제할까요?")) return;
        await api(`/api/notes?id=${encodeURIComponent(state.currentNoteId)}`, { method: "DELETE" });
        state.notes = state.notes.filter((note) => note.id !== state.currentNoteId);
        resetEditor();
        renderNotes();
        showToast("메모를 삭제했습니다.");
      }

      async function uploadOne(file, expected) {
        if (expected === "image" && !file.type.startsWith("image/")) {
          throw new Error(`${file.name}은 이미지 파일이 아닙니다.`);
        }
        if (expected === "file" && file.type.startsWith("image/")) {
          throw new Error(`${file.name}은 이미지 탭에 업로드하세요.`);
        }

        const signed = await api("/api/files", {
          method: "POST",
          body: JSON.stringify({
            action: "upload-url",
            name: file.name,
            type: file.type || "application/octet-stream",
            size: file.size,
          }),
        });

        let upload;
        try {
          upload = await fetch(signed.uploadUrl, {
            method: "PUT",
            body: file,
          });
        } catch {
          throw new Error(`R2 CORS에 ${window.location.origin} 주소를 추가하세요.`);
        }
        if (!upload.ok) throw new Error("R2 업로드에 실패했습니다. R2 CORS 설정을 확인하세요.");

        const data = await api("/api/files", {
          method: "POST",
          body: JSON.stringify({
            action: "complete",
            file: signed.file,
          }),
        });
        return data.file;
      }

      async function uploadMany(fileList, expected) {
        const files = Array.from(fileList || []);
        if (!files.length) return;

        setStatus("업로드 중");
        let uploaded = 0;
        for (const file of files) {
          const record = await uploadOne(file, expected);
          if (!state.files.some((item) => item.id === record.id)) {
            state.files.unshift(record);
          }
          uploaded += 1;
          setStatus(`${uploaded}/${files.length} 업로드`);
        }
        renderImages();
        renderFiles();
        setStatus("저장됨");
        showToast(`${uploaded}개를 업로드했습니다.`);
      }

      async function deleteFile(id) {
        if (!confirm("이 항목을 삭제할까요?")) return;
        await api(`/api/files?id=${encodeURIComponent(id)}`, { method: "DELETE" });
        state.files = state.files.filter((file) => file.id !== id);
        renderImages();
        renderFiles();
        showToast("삭제했습니다.");
      }

      function bindDropzone(zoneId, inputId, expected) {
        const zone = $(zoneId);
        const input = $(inputId);

        input.addEventListener("change", () => {
          uploadMany(input.files, expected)
            .catch((error) => showToast(error.message))
            .finally(() => {
              input.value = "";
            });
        });

        ["dragenter", "dragover"].forEach((eventName) => {
          zone.addEventListener(eventName, (event) => {
            event.preventDefault();
            zone.classList.add("dragging");
          });
        });

        ["dragleave", "drop"].forEach((eventName) => {
          zone.addEventListener(eventName, (event) => {
            event.preventDefault();
            zone.classList.remove("dragging");
          });
        });

        zone.addEventListener("drop", (event) => {
          uploadMany(event.dataTransfer.files, expected).catch((error) => showToast(error.message));
        });
      }

      $("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await api("/api/login", {
            method: "POST",
            body: JSON.stringify({ password: $("password").value }),
          });
          $("password").value = "";
          showApp();
          resetEditor();
          await loadAll();
        } catch (error) {
          showToast(error.message);
        }
      });

      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => setTab(button.dataset.tab));
      });

      $("noteForm").addEventListener("submit", (event) => saveNote(event).catch((error) => showToast(error.message)));
      $("deleteNoteButton").addEventListener("click", () => deleteCurrentNote().catch((error) => showToast(error.message)));
      $("newNoteButton").addEventListener("click", resetEditor);
      $("refreshButton").addEventListener("click", () => loadAll().catch((error) => showToast(error.message)));
      $("logoutButton").addEventListener("click", async () => {
        await api("/api/logout", { method: "POST", body: "{}" }).catch(() => {});
        showLogin();
      });
      bindDropzone("imageDropzone", "imageInput", "image");
      bindDropzone("fileDropzone", "fileInput", "file");

      (async function boot() {
        resetEditor();
        try {
          const session = await api("/api/session");
          if (session.authenticated) {
            showApp();
            await loadAll();
          } else {
            showLogin();
          }
        } catch {
          showLogin();
        }
      })();
    </script>
  </body>
</html>
